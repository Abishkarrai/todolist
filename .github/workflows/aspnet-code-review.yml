name: ASP.NET 9 Code Review

on:
  pull_request:
    branches:
      - development
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    name: Production Code Review

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.cs
            **/*.csproj
            **/appsettings*.json
            **/Program.cs
            **/*.xml

      - name: Review ASP.NET Changes
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "## 🔍 ASP.NET 9 Code Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Files:" >> $GITHUB_STEP_SUMMARY
          
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Review Checklist:" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Security: Auth, credentials, encryption, injection" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Stability: Logic changes, null handling, exceptions" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Startup: Middleware, DI, configuration order" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Serialization: JSON, mapping, validation" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Async: Blocking, deadlocks, thread-safety" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Deployment: Rollback risk, migration path" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Use the checklist above to review changes before merging." >> $GITHUB_STEP_SUMMARY

      - name: Post Review Comment
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 ASP.NET 9 Production Review

### ⚠️ Please review these areas:

**Security**
- [ ] Authentication/authorization changes
- [ ] Credential handling (no plaintext secrets)
- [ ] SQL injection, XSS, deserialization risks
- [ ] CORS, CSRF configuration

**Stability**
- [ ] Hidden logic or behavior changes
- [ ] Null reference or default value changes
- [ ] Exception handling paths
- [ ] Async/await blocking issues

**Startup & Deployment**
- [ ] Middleware registration order
- [ ] Service lifetime changes (Transient/Scoped/Singleton)
- [ ] Configuration loading sequence
- [ ] Database migration impact

**Data & Serialization**
- [ ] Entity mapping changes
- [ ] JSON serialization settings
- [ ] Data type changes
- [ ] Validation logic

---

📋 **Next Steps:**
1. Review the changed files against this checklist
2. Flag any production-risk findings as comments
3. Request changes if blockers are found
4. Merge once satisfied with the review`
            })
